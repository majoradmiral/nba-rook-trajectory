name: Check Summer League CDN

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests pandas
      - name: Try CDN endpoint via scraper
        run: python scripts/check_sl_cdn.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: Summer League CDN data snapshot"
          file_pattern: data/raw/sl_players.json
